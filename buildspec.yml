version: 0.2

env:
  variables:
    IMAGE_REPO: "deepakc742004/brain-tasks-app"
  parameter-store:
    DOCKERHUB_USERNAME: "/dockerhub/username"
    DOCKERHUB_PASSWORD: "/dockerhub/password"

phases:
  pre_build:
    commands:
      - echo "Logging in to DockerHub..."
      - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      # Get the first 7 characters of the Git commit ID for versioning
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - echo "Using image tag $IMAGE_TAG"

  build:
    commands:
      - echo "Building and Pushing Docker image..."
      - docker build -t $IMAGE_REPO:$IMAGE_TAG .
      - docker push $IMAGE_REPO:$IMAGE_TAG

  post_build:
    commands:
      - echo "Updating Kubernetes manifests..."
      - mkdir -p out
      # Using '#' as a delimiter in sed to avoid issues with '/' in the image name
      - sed "s|image: .*|image: $IMAGE_REPO:$IMAGE_TAG|g" k8s/deployment.yaml > out/deployment.yaml
      - cp k8s/service.yaml out/service.yaml
      - echo "Build completed on `date`"

artifacts:
  files:
    - '**/*'
  base-directory: 'out'
  discard-paths: yes
